name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e .[dev]
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-key-for-ci' }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'deepseek-chat' }}
        PROJECT_PATH: ${{ secrets.PROJECT_PATH || './' }}

    - name: Check environment
      run: |
        source .venv/bin/activate
        make check-env
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'test-key-for-ci' }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
        OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'deepseek-chat' }}
        PROJECT_PATH: ${{ secrets.PROJECT_PATH || './' }}

    - name: Run tests
      run: |
        source .venv/bin/activate
        make test

    - name: Run tests with coverage
      run: |
        source .venv/bin/activate
        pip install pytest-cov psutil
        pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

    - name: Run linting
      run: |
        source .venv/bin/activate
        make lint

    - name: Run type checking
      run: |
        source .venv/bin/activate
        make type-check

    - name: Run formatting check
      run: |
        source .venv/bin/activate
        make format-check

